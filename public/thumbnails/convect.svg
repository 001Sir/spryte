<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="heat" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Temperature grid (subtle) -->
  <g opacity="0.15">
    <rect x="140" y="180" width="20" height="20" fill="#ef4444"/>
    <rect x="160" y="180" width="20" height="20" fill="#dc2626" opacity="0.7"/>
    <rect x="120" y="180" width="20" height="20" fill="#dc2626" opacity="0.5"/>
    <rect x="140" y="160" width="20" height="20" fill="#f87171" opacity="0.6"/>
    <rect x="160" y="160" width="20" height="20" fill="#fca5a5" opacity="0.3"/>
    <rect x="120" y="160" width="20" height="20" fill="#fca5a5" opacity="0.3"/>
    <rect x="140" y="140" width="20" height="20" fill="#fecaca" opacity="0.2"/>

    <rect x="260" y="100" width="20" height="20" fill="#3b82f6"/>
    <rect x="280" y="100" width="20" height="20" fill="#2563eb" opacity="0.7"/>
    <rect x="240" y="100" width="20" height="20" fill="#2563eb" opacity="0.5"/>
    <rect x="260" y="120" width="20" height="20" fill="#60a5fa" opacity="0.6"/>
    <rect x="280" y="120" width="20" height="20" fill="#93c5fd" opacity="0.3"/>
    <rect x="240" y="120" width="20" height="20" fill="#93c5fd" opacity="0.3"/>
  </g>

  <!-- Walls -->
  <g fill="#374151" stroke="#4b5563" stroke-width="1">
    <rect x="80" y="120" width="20" height="80" rx="2"/>
    <rect x="300" y="140" width="20" height="80" rx="2"/>
    <rect x="180" y="80" width="60" height="20" rx="2"/>
  </g>

  <!-- Convection current flow arrows -->
  <g stroke="#ef4444" stroke-width="1.5" fill="none" opacity="0.3" filter="url(#glow)">
    <!-- Rising current from heat -->
    <path d="M150 175 Q150 140 150 120 Q150 100 170 90"/>
    <polygon points="170,90 164,96 168,92" fill="#ef4444"/>
    <!-- Across top -->
    <path d="M170 90 Q200 80 230 90"/>
    <polygon points="230,90 224,86 225,92" fill="#ef4444"/>
  </g>
  <g stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.3" filter="url(#glow)">
    <!-- Sinking current from cold -->
    <path d="M270 105 Q270 140 270 160 Q270 180 250 190"/>
    <polygon points="250,190 256,184 254,190" fill="#3b82f6"/>
    <!-- Across bottom -->
    <path d="M250 190 Q220 200 190 190"/>
    <polygon points="190,190 196,186 194,192" fill="#3b82f6"/>
  </g>

  <!-- Heat source -->
  <g filter="url(#glow-strong)">
    <circle cx="150" cy="190" r="25" fill="url(#heat)"/>
    <circle cx="150" cy="190" r="10" fill="#ef4444" opacity="0.6"/>
    <circle cx="150" cy="190" r="5" fill="#fbbf24" opacity="0.8"/>
  </g>

  <!-- Cold sink -->
  <g filter="url(#glow-strong)">
    <circle cx="270" cy="100" r="25" fill="url(#cold)"/>
    <circle cx="270" cy="100" r="10" fill="#3b82f6" opacity="0.6"/>
    <circle cx="270" cy="100" r="5" fill="#93c5fd" opacity="0.8"/>
  </g>

  <!-- Floating particles riding the current -->
  <g filter="url(#glow)">
    <circle cx="148" cy="145" r="4" fill="#fef3c7" opacity="0.9"/>
    <circle cx="165" cy="105" r="3.5" fill="#fde68a" opacity="0.8"/>
    <circle cx="210" cy="88" r="3" fill="#e5e7eb" opacity="0.7"/>
    <circle cx="255" cy="130" r="3.5" fill="#bfdbfe" opacity="0.8"/>
    <circle cx="230" cy="185" r="4" fill="#dbeafe" opacity="0.7"/>
  </g>

  <!-- Goal zone -->
  <g filter="url(#glow)">
    <circle cx="330" cy="60" r="18" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>
    <circle cx="330" cy="60" r="8" fill="#22c55e" opacity="0.2"/>
    <text x="330" y="64" font-family="monospace" font-size="8" fill="#22c55e" text-anchor="middle" opacity="0.8">GOAL</text>
  </g>

  <!-- Another goal -->
  <g filter="url(#glow)" opacity="0.5">
    <circle cx="60" cy="240" r="15" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="60" cy="240" r="6" fill="#22c55e" opacity="0.2"/>
  </g>

  <!-- HUD elements -->
  <text x="20" y="25" font-family="monospace" font-size="10" fill="#9ca3af" opacity="0.5">LVL 4</text>
  <text x="380" y="25" font-family="monospace" font-size="10" fill="#9ca3af" text-anchor="end" opacity="0.5">Heat: 2 Cold: 1</text>

  <!-- Title -->
  <text x="200" y="278" font-family="monospace" font-weight="bold" font-size="14" fill="#ef4444" text-anchor="middle" opacity="0.5" filter="url(#glow)">CONVECT</text>
</svg>
