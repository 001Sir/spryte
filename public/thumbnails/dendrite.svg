<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Neural network connections -->
  <g stroke="#a855f7" stroke-width="2" opacity="0.3">
    <line x1="80" y1="80" x2="160" y2="140"/>
    <line x1="80" y1="80" x2="200" y2="60"/>
    <line x1="160" y1="140" x2="260" y2="100"/>
    <line x1="160" y1="140" x2="200" y2="220"/>
    <line x1="200" y1="60" x2="260" y2="100"/>
    <line x1="260" y1="100" x2="340" y2="160"/>
    <line x1="200" y1="220" x2="340" y2="160"/>
    <line x1="200" y1="220" x2="120" y2="240"/>
    <line x1="260" y1="100" x2="300" y2="50"/>
  </g>

  <!-- Active signal path (glowing) -->
  <g stroke="#c084fc" stroke-width="3" filter="url(#glow)">
    <line x1="80" y1="80" x2="160" y2="140" opacity="0.8"/>
    <line x1="160" y1="140" x2="260" y2="100" opacity="0.8"/>
    <line x1="260" y1="100" x2="340" y2="160" opacity="0.8"/>
  </g>

  <!-- Signal traveling dot -->
  <circle cx="210" cy="120" r="5" fill="#e9d5ff" filter="url(#glow-strong)" opacity="0.9"/>
  <circle cx="210" cy="120" r="3" fill="#fff"/>

  <!-- Neural nodes -->
  <g filter="url(#glow)">
    <!-- Start node (green) -->
    <circle cx="80" cy="80" r="16" fill="#1a1030" stroke="#22c55e" stroke-width="2.5"/>
    <text x="80" y="84" font-family="monospace" font-size="8" fill="#22c55e" text-anchor="middle">whale</text>

    <!-- Regular nodes -->
    <circle cx="160" cy="140" r="14" fill="#1a1030" stroke="#a855f7" stroke-width="2"/>
    <text x="160" y="144" font-family="monospace" font-size="7" fill="#c4b5fd" text-anchor="middle">ocean</text>

    <circle cx="200" cy="60" r="14" fill="#1a1030" stroke="#a855f7" stroke-width="2"/>
    <text x="200" y="64" font-family="monospace" font-size="7" fill="#c4b5fd" text-anchor="middle">mammal</text>

    <circle cx="260" cy="100" r="14" fill="#1a1030" stroke="#a855f7" stroke-width="2"/>
    <text x="260" y="104" font-family="monospace" font-size="7" fill="#c4b5fd" text-anchor="middle">reef</text>

    <!-- Target node (gold) -->
    <circle cx="340" cy="160" r="16" fill="#1a1030" stroke="#eab308" stroke-width="2.5"/>
    <text x="340" y="164" font-family="monospace" font-size="7" fill="#fbbf24" text-anchor="middle">coral</text>

    <!-- Decoy nodes (dimmer) -->
    <circle cx="200" cy="220" r="12" fill="#1a1030" stroke="#6b7280" stroke-width="1.5" opacity="0.6"/>
    <text x="200" y="224" font-family="monospace" font-size="7" fill="#9ca3af" text-anchor="middle">drum</text>

    <circle cx="120" cy="240" r="12" fill="#1a1030" stroke="#6b7280" stroke-width="1.5" opacity="0.6"/>
    <text x="120" y="244" font-family="monospace" font-size="7" fill="#9ca3af" text-anchor="middle">note</text>

    <circle cx="300" cy="50" r="12" fill="#1a1030" stroke="#6b7280" stroke-width="1.5" opacity="0.6"/>
    <text x="300" y="54" font-family="monospace" font-size="7" fill="#9ca3af" text-anchor="middle">cactus</text>
  </g>

  <!-- Title -->
  <text x="200" y="278" font-family="monospace" font-weight="bold" font-size="14" fill="#a855f7" text-anchor="middle" opacity="0.5" filter="url(#glow)">DENDRITE</text>
</svg>
