<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Ground -->
  <rect x="0" y="220" width="400" height="80" fill="#1a1a2e"/>
  <line x1="0" y1="220" x2="400" y2="220" stroke="#2a2a4a" stroke-width="2"/>

  <!-- Grid dots -->
  <g fill="#1a1a2f" opacity="0.4">
    <circle cx="40" cy="40" r="1"/><circle cx="80" cy="40" r="1"/><circle cx="120" cy="40" r="1"/><circle cx="160" cy="40" r="1"/><circle cx="200" cy="40" r="1"/><circle cx="240" cy="40" r="1"/><circle cx="280" cy="40" r="1"/><circle cx="320" cy="40" r="1"/><circle cx="360" cy="40" r="1"/>
    <circle cx="40" cy="80" r="1"/><circle cx="80" cy="80" r="1"/><circle cx="120" cy="80" r="1"/><circle cx="160" cy="80" r="1"/><circle cx="200" cy="80" r="1"/><circle cx="240" cy="80" r="1"/><circle cx="280" cy="80" r="1"/><circle cx="320" cy="80" r="1"/><circle cx="360" cy="80" r="1"/>
    <circle cx="40" cy="120" r="1"/><circle cx="80" cy="120" r="1"/><circle cx="120" cy="120" r="1"/><circle cx="160" cy="120" r="1"/><circle cx="200" cy="120" r="1"/><circle cx="240" cy="120" r="1"/><circle cx="280" cy="120" r="1"/><circle cx="320" cy="120" r="1"/><circle cx="360" cy="120" r="1"/>
    <circle cx="40" cy="160" r="1"/><circle cx="80" cy="160" r="1"/><circle cx="120" cy="160" r="1"/><circle cx="160" cy="160" r="1"/><circle cx="200" cy="160" r="1"/><circle cx="240" cy="160" r="1"/><circle cx="280" cy="160" r="1"/><circle cx="320" cy="160" r="1"/><circle cx="360" cy="160" r="1"/>
  </g>

  <!-- Trail particles -->
  <g opacity="0.3">
    <circle cx="50" cy="195" r="3" fill="#f97316"/>
    <circle cx="65" cy="190" r="2" fill="#fb923c"/>
    <circle cx="78" cy="198" r="2.5" fill="#f97316"/>
    <circle cx="95" cy="185" r="2" fill="#fb923c"/>
    <circle cx="108" cy="175" r="1.5" fill="#f97316"/>
  </g>

  <!-- Runner form (left, on ground) -->
  <g filter="url(#glow)" opacity="0.5">
    <circle cx="60" cy="195" r="9" fill="#f97316"/>
    <circle cx="60" cy="182" r="5" fill="#f97316"/>
    <line x1="60" y1="204" x2="54" y2="215" stroke="#f97316" stroke-width="2.5"/>
    <line x1="60" y1="204" x2="66" y2="215" stroke="#f97316" stroke-width="2.5"/>
  </g>

  <!-- Arrow between forms -->
  <path d="M90,195 L110,170" stroke="#ffffff" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>

  <!-- Ball form (mid-left, bouncing) -->
  <g filter="url(#glow)">
    <circle cx="140" cy="165" r="14" fill="#ef4444" opacity="0.7"/>
    <line x1="140" y1="165" x2="150" y2="158" stroke="#f87171" stroke-width="2" opacity="0.7"/>
    <!-- Bounce arc -->
    <path d="M115,220 Q128,140 140,165" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
  </g>

  <!-- Breakable wall being smashed -->
  <rect x="165" y="170" width="25" height="50" fill="#5a3a2a" opacity="0.6"/>
  <g opacity="0.5">
    <line x1="172" y1="170" x2="180" y2="195" stroke="#8a6a4a" stroke-width="1"/>
    <line x1="165" y1="195" x2="183" y2="190" stroke="#8a6a4a" stroke-width="1"/>
  </g>
  <!-- Debris particles -->
  <g fill="#8a6a4a" opacity="0.4">
    <rect x="192" y="175" width="4" height="4" transform="rotate(25,194,177)"/>
    <rect x="195" y="185" width="3" height="3" transform="rotate(40,196,186)"/>
    <rect x="190" y="195" width="5" height="3" transform="rotate(-15,192,196)"/>
  </g>

  <!-- Arrow -->
  <path d="M190,180 L215,140" stroke="#ffffff" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>

  <!-- Glider form (center, soaring) -->
  <g filter="url(#glow-strong)">
    <polygon points="260,120 230,108 240,120 230,132" fill="#06b6d4"/>
    <!-- Wind lines -->
    <line x1="225" y1="112" x2="210" y2="112" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="222" y1="120" x2="200" y2="120" stroke="#06b6d4" stroke-width="1" opacity="0.2"/>
    <line x1="225" y1="128" x2="208" y2="128" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Pit below glider -->
  <rect x="220" y="220" width="60" height="30" fill="#050510"/>
  <rect x="220" y="220" width="3" height="15" fill="#ff3366" opacity="0.5"/>
  <rect x="277" y="220" width="3" height="15" fill="#ff3366" opacity="0.5"/>

  <!-- Arrow -->
  <path d="M270,135 L310,170" stroke="#ffffff" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>

  <!-- Spike form (right, ground-pounding) -->
  <g filter="url(#glow)">
    <polygon points="330,210 315,185 320,178 340,178 345,185" fill="#a855f7"/>
    <!-- Impact ring -->
    <ellipse cx="330" cy="220" rx="30" ry="5" fill="none" stroke="#c084fc" stroke-width="2" opacity="0.4"/>
    <ellipse cx="330" cy="220" rx="20" ry="3" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Impact particles -->
  <g fill="#a855f7" opacity="0.4">
    <circle cx="305" cy="215" r="2"/>
    <circle cx="355" cy="213" r="2.5"/>
    <circle cx="312" cy="208" r="1.5"/>
    <circle cx="348" cy="210" r="2"/>
  </g>

  <!-- Gems scattered -->
  <g fill="#ffd700" filter="url(#glow)">
    <polygon points="155,145 160,150 155,155 150,150" opacity="0.7"/>
    <polygon points="200,100 205,105 200,110 195,105" opacity="0.5"/>
    <polygon points="290,90 295,95 290,100 285,95" opacity="0.6"/>
  </g>

  <!-- Speed lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="80" x2="60" y2="80"/>
    <line x1="0" y1="130" x2="45" y2="130"/>
    <line x1="0" y1="160" x2="30" y2="160"/>
    <line x1="0" y1="200" x2="50" y2="200"/>
  </g>

  <!-- Combo text -->
  <text x="200" y="60" font-family="monospace" font-weight="bold" font-size="16" fill="#ffd700" text-anchor="middle" opacity="0.6" filter="url(#glow)">MORPH x4!</text>
</svg>
