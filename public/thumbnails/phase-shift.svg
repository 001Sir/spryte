<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glowCyan">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowMagenta">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowGold">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="50" cy="30" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="120" cy="60" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="200" cy="20" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="300" cy="50" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="350" cy="80" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="80" cy="100" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="250" cy="90" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="370" cy="25" r="1" fill="#fff" opacity="0.6"/>

  <!-- Grid floor -->
  <line x1="0" y1="230" x2="400" y2="230" stroke="#00ffff" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="250" x2="400" y2="250" stroke="#00ffff" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="270" x2="400" y2="270" stroke="#00ffff" stroke-width="1" opacity="0.06"/>
  <line x1="80" y1="230" x2="60" y2="300" stroke="#00ffff" stroke-width="1" opacity="0.08"/>
  <line x1="160" y1="230" x2="150" y2="300" stroke="#00ffff" stroke-width="1" opacity="0.08"/>
  <line x1="240" y1="230" x2="250" y2="300" stroke="#00ffff" stroke-width="1" opacity="0.08"/>
  <line x1="320" y1="230" x2="340" y2="300" stroke="#00ffff" stroke-width="1" opacity="0.08"/>

  <!-- Phase A platform (cyan) -->
  <rect x="60" y="190" width="80" height="10" fill="#00ffff" opacity="0.6" filter="url(#glowCyan)"/>
  <rect x="200" y="160" width="70" height="10" fill="#00ffff" opacity="0.6" filter="url(#glowCyan)"/>

  <!-- Phase B platform (magenta) - ghosted -->
  <rect x="130" y="175" width="70" height="10" fill="none" stroke="#ff00ff" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
  <rect x="300" y="180" width="60" height="10" fill="none" stroke="#ff00ff" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>

  <!-- Phase A obstacle (cyan) -->
  <rect x="270" y="180" width="20" height="50" fill="#00ffff" opacity="0.5" filter="url(#glowCyan)"/>

  <!-- Phase B obstacle ghosted -->
  <rect x="170" y="190" width="20" height="40" fill="none" stroke="#ff00ff" stroke-width="1" stroke-dasharray="3,3" opacity="0.15"/>

  <!-- Player (square with cyan glow) -->
  <rect x="105" y="168" width="18" height="18" fill="#00ffff" opacity="0.9" filter="url(#glowCyan)"/>

  <!-- Player trail particles -->
  <circle cx="100" cy="178" r="2" fill="#00ffff" opacity="0.4"/>
  <circle cx="94" cy="175" r="1.5" fill="#00ffff" opacity="0.3"/>
  <circle cx="88" cy="180" r="1" fill="#00ffff" opacity="0.2"/>

  <!-- Portal -->
  <circle cx="340" cy="190" r="14" fill="none" stroke="#ffaa00" stroke-width="2" opacity="0.7" filter="url(#glowGold)"/>
  <circle cx="340" cy="190" r="6" fill="#ffaa00" opacity="0.3"/>

  <!-- Collectible star -->
  <polygon points="225,130 228,138 236,138 229,143 232,151 225,146 218,151 221,143 214,138 222,138" fill="#ffd700" filter="url(#glowGold)" opacity="0.8"/>

  <!-- Phase indicator text -->
  <text x="30" y="130" font-family="monospace" font-size="11" fill="#00ffff" opacity="0.7" filter="url(#glowCyan)">PHASE A</text>
  <text x="320" y="130" font-family="monospace" font-size="11" fill="#ff00ff" opacity="0.4">PHASE B</text>

  <!-- Speed lines -->
  <line x1="0" y1="140" x2="25" y2="140" stroke="#00ffff" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="200" x2="20" y2="200" stroke="#00ffff" stroke-width="1" opacity="0.1"/>
  <line x1="380" y1="160" x2="400" y2="160" stroke="#ff00ff" stroke-width="1" opacity="0.1"/>
</svg>
