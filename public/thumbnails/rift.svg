<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c0c1a"/>
      <stop offset="100%" stop-color="#06050e"/>
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f0ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Grid dots -->
  <g fill="#1a1a2f" opacity="0.5">
    <circle cx="40" cy="30" r="1"/><circle cx="80" cy="30" r="1"/><circle cx="120" cy="30" r="1"/><circle cx="160" cy="30" r="1"/><circle cx="200" cy="30" r="1"/><circle cx="240" cy="30" r="1"/><circle cx="280" cy="30" r="1"/><circle cx="320" cy="30" r="1"/><circle cx="360" cy="30" r="1"/>
    <circle cx="40" cy="70" r="1"/><circle cx="80" cy="70" r="1"/><circle cx="120" cy="70" r="1"/><circle cx="160" cy="70" r="1"/><circle cx="200" cy="70" r="1"/><circle cx="240" cy="70" r="1"/><circle cx="280" cy="70" r="1"/><circle cx="320" cy="70" r="1"/><circle cx="360" cy="70" r="1"/>
    <circle cx="40" cy="110" r="1"/><circle cx="80" cy="110" r="1"/><circle cx="120" cy="110" r="1"/><circle cx="160" cy="110" r="1"/><circle cx="200" cy="110" r="1"/><circle cx="240" cy="110" r="1"/><circle cx="280" cy="110" r="1"/><circle cx="320" cy="110" r="1"/><circle cx="360" cy="110" r="1"/>
    <circle cx="40" cy="150" r="1"/><circle cx="80" cy="150" r="1"/><circle cx="120" cy="150" r="1"/><circle cx="160" cy="150" r="1"/><circle cx="200" cy="150" r="1"/><circle cx="240" cy="150" r="1"/><circle cx="280" cy="150" r="1"/><circle cx="320" cy="150" r="1"/><circle cx="360" cy="150" r="1"/>
    <circle cx="40" cy="190" r="1"/><circle cx="80" cy="190" r="1"/><circle cx="120" cy="190" r="1"/><circle cx="160" cy="190" r="1"/><circle cx="200" cy="190" r="1"/><circle cx="240" cy="190" r="1"/><circle cx="280" cy="190" r="1"/><circle cx="320" cy="190" r="1"/><circle cx="360" cy="190" r="1"/>
    <circle cx="40" cy="230" r="1"/><circle cx="80" cy="230" r="1"/><circle cx="120" cy="230" r="1"/><circle cx="160" cy="230" r="1"/><circle cx="200" cy="230" r="1"/><circle cx="240" cy="230" r="1"/><circle cx="280" cy="230" r="1"/><circle cx="320" cy="230" r="1"/><circle cx="360" cy="230" r="1"/>
    <circle cx="40" cy="270" r="1"/><circle cx="80" cy="270" r="1"/><circle cx="120" cy="270" r="1"/><circle cx="160" cy="270" r="1"/><circle cx="200" cy="270" r="1"/><circle cx="240" cy="270" r="1"/><circle cx="280" cy="270" r="1"/><circle cx="320" cy="270" r="1"/><circle cx="360" cy="270" r="1"/>
  </g>

  <!-- Trail (curved path) -->
  <path d="M80,200 Q120,100 180,160 T280,140 T340,180" fill="none" stroke="#00f0ff" stroke-width="12" stroke-linecap="round" opacity="0.15" filter="url(#glow-strong)"/>
  <path d="M80,200 Q120,100 180,160 T280,140 T340,180" fill="none" stroke="#00f0ff" stroke-width="6" stroke-linecap="round" opacity="0.4" filter="url(#glow)"/>
  <path d="M80,200 Q120,100 180,160 T280,140 T340,180" fill="none" stroke="#99ffff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Warp portal (entry) -->
  <circle cx="180" cy="155" r="18" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <circle cx="180" cy="155" r="10" fill="#00f0ff" opacity="0.15"/>

  <!-- Enemy bullet approaching trail -->
  <circle cx="210" cy="90" r="5" fill="#ff4444" filter="url(#glow)"/>
  <circle cx="230" cy="100" r="4" fill="#ff4444" opacity="0.6"/>
  <line x1="210" y1="90" x2="190" y2="145" stroke="#ff4444" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Warp portal (exit) -->
  <circle cx="290" cy="140" r="15" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <circle cx="290" cy="140" r="8" fill="#00f0ff" opacity="0.2"/>

  <!-- Warped bullet leaving trail toward enemy -->
  <circle cx="320" cy="110" r="5" fill="#00f0ff" filter="url(#glow)"/>
  <circle cx="320" cy="110" r="2.5" fill="#ffffff"/>
  <line x1="290" y1="135" x2="320" y2="110" stroke="#00f0ff" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Enemy (diamond shape) -->
  <polygon points="355,65 370,80 355,95 340,80" fill="#ff3366" filter="url(#glow)" opacity="0.9"/>

  <!-- Enemy 2 -->
  <polygon points="60,100 75,85 90,100 75,115" fill="#ff3366" opacity="0.5"/>

  <!-- Player orb -->
  <circle cx="340" cy="178" r="20" fill="url(#orb)" filter="url(#glow-strong)"/>
  <circle cx="340" cy="178" r="10" fill="#00f0ff"/>
  <circle cx="340" cy="178" r="4" fill="#ffffff"/>
</svg>
